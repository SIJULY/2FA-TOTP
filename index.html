<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>2FA TOTP 动态验证码获取</title>
  <link rel="stylesheet" href="css/bulma-0.9.0.min.css">
  <!-- 引入现代化无衬线字体和等宽字体 -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
  <style>
    [v-cloak] {
      display: none;
    }

    /* 现代感动态渐变背景 */
    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      color: #333;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      max-width: 600px !important;
      padding-top: 4vh;
      padding-bottom: 4vh;
    }

    /* 清爽的白色玻璃拟态卡片 */
    .panel-box {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
      padding: 3rem 2.5rem;
    }

    .title {
      font-weight: 800;
      color: #1a1a1a;
      letter-spacing: -0.5px;
      margin-bottom: 2rem !important;
    }

    .label {
      color: #4a4a4a;
      font-weight: 600;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* 现代化大号输入框 */
    .input {
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      padding: 1.2rem;
      font-size: 1rem;
      box-shadow: none !important;
      transition: all 0.3s;
      background: #f8f9fa;
      color: #333;
      font-family: 'JetBrains Mono', monospace; /* 秘钥使用等宽字体防看错 */
    }

    .input:focus {
      border-color: #23a6d5;
      background: #fff;
    }

    /* 倒计时展示 */
    .timer-text {
      font-size: 1.2rem;
      font-weight: 800;
      color: #e73c7e;
      text-align: center;
      margin-bottom: 0.5rem;
    }

    /* 加粗加大的进度条 */
    .progress {
      height: 14px;
      border-radius: 7px;
      background-color: #e2e8f0;
      overflow: hidden;
      margin-bottom: 0 !important;
    }

    .progress::-webkit-progress-value {
      background: linear-gradient(90deg, #23a6d5, #23d5ab);
      transition: width 0.2s ease;
    }
    .progress::-moz-progress-bar {
      background: linear-gradient(90deg, #23a6d5, #23d5ab);
    }

    /* 验证码展示大框 */
    .token-display-box {
      margin: 2rem 0;
      padding: 2.5rem 0 2rem 0;
      background: #f8f9fa;
      border-radius: 20px;
      border: 2px dashed #cbd5e1;
      text-align: center;
    }

    /* 超大高对比度验证码 */
    #token {
      font-family: 'JetBrains Mono', monospace;
      font-size: 4.5rem;
      font-weight: 700;
      letter-spacing: 12px;
      color: #0f172a;
      margin-bottom: 0;
      margin-right: -12px; /* 补偿最后一个字符的间距使其完全居中 */
    }

    /* 现代风复制按钮 */
    #clipboard-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #23a6d5;
      color: white;
      border: none;
      border-radius: 50px;
      padding: 1rem 3rem;
      font-size: 1.2rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(35, 166, 213, 0.3);
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      text-decoration: none;
    }

    #clipboard-button:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 25px rgba(35, 166, 213, 0.4);
      background: #1e92bd;
    }
    
    #clipboard-button:active {
      transform: translateY(1px);
    }

    /* 将黑色 SVG 图标转为纯白色 */
    .copy-icon {
      width: 24px;
      height: 24px;
      margin-right: 10px;
      filter: brightness(0) invert(1);
    }

    /* 柔和的提示框 */
    .notification.is-light {
      background-color: #f1f5f9;
      border-radius: 12px;
      color: #475569;
      padding: 1.5rem;
      border-left: 4px solid #23a6d5;
      font-size: 0.95rem;
    }

    .notification p {
      margin-bottom: 0.5em;
    }

    .footer {
      background: transparent;
      padding: 2rem 1.5rem;
    }

    .footer .content {
      color: rgba(255,255,255,0.9);
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    .footer a {
      color: #fff;
      text-decoration: underline;
    }

    /* 移动端适配 */
    @media screen and (max-width: 768px) {
      .panel-box {
        padding: 2rem 1.5rem;
      }
      #token {
        font-size: 3.5rem;
        letter-spacing: 6px;
        margin-right: -6px;
      }
      #clipboard-button {
        width: 100%;
      }
    }
  </style>
</head>

<body>

  <script defer src="js/vue-2.4.0.min.js"></script>
  <script defer src="js/otpauth-3.1.3.min.js"></script>
  <script defer src="js/clipboard-2.0.6.min.js"></script>
  <script defer src="js/app.js?v=1.0"></script>

  <section id="app" class="section" v-cloak>

    <div class="container">
      <div class="panel-box">
        <div class="has-text-centered">
            <h1 class="title">TOTP 动态验证码</h1>
        </div>
        
        <div class="field">
          <label class="label">2FA 秘钥 (Secret Key)</label>
          <div class="control">
            <input class="input" type="text" v-model="secret_key" placeholder="在此处粘贴你的 Base32 格式秘钥">
          </div>
        </div>

        <div class="columns is-mobile">
          <div class="column">
            <div class="field">
              <label class="label">位数</label>
              <div class="control">
                <input class="input" type="text" v-model="digits" placeholder="默认 6">
              </div>
            </div>
          </div>
          <div class="column">
            <div class="field">
              <label class="label">刷新周期(秒)</label>
              <div class="control">
                <input class="input" type="text" v-model="period" placeholder="默认 30">
              </div>
            </div>
          </div>
        </div>

        <div class="token-display-box">
          <p id="token">{{ token }}</p>
          
          <div style="padding: 0 2rem; margin-top: 1.5rem;">
            <div class="timer-text">距离刷新还剩 {{ updatingIn }} 秒</div>
            <progress class="progress" v-bind:value="updatingIn" :max="period"></progress>
          </div>
        </div>

        <div class="has-text-centered">
          <a id="clipboard-button" data-clipboard-target="#token">
            <img src="img/copy.svg" class="copy-icon"> 复制验证码
          </a>
        </div>
        
        <div class="notification is-light" style="margin-top: 2.5rem;">
            <p><strong>使用指引：</strong></p>
            <p>1. 在最上方的输入框内填入或粘贴你的 2FA 秘钥。</p>
            <p>2. 中间大字显示的数字即为实时验证码，请关注下方的刷新倒计时进度条。</p>
            <p>3. 点击蓝色的 <strong>"复制验证码"</strong> 按钮，即可直接粘贴到目标网站使用。</p>
        </div> 
      </div>     
    </div>

  </section>

  <footer class="footer">
    <div class="container">
      <div class="content has-text-centered">
        Built with ❤️ by <a href="https://sijuly.nyc.mn" target="_blank">小龙女她爸</a>
      </div>
    </div>
  </footer>

</body>
</html>
