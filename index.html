<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>2FA Authenticator</title>
  <!-- 引入高级且干净的字体 -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <style>
    [v-cloak] { display: none; }

    /* 高级暗黑主题 (Premium Dark / Vercel Style) */
    :root {
      --bg-color: #000000;
      --card-bg: #0a0a0a;
      --border-color: #222222;
      --border-hover: #444444;
      --text-main: #ededed;
      --text-muted: #888888;
      --primary: #ffffff;
      --primary-invert: #000000;
    }

    * {
      box-sizing: border-box;
      /* 坚决禁用移动端长按选中文本和弹出菜单 */
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', -apple-system, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      /* 深邃的径向渐变背景 */
      background-image: radial-gradient(circle at 50% 0%, #1a1a1a 0%, #000000 70%);
    }

    .container {
      width: 100%;
      max-width: 460px;
      padding: 20px;
      z-index: 1;
    }

    /* 核心卡片设计：极简、深色、细边框 */
    .auth-card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 40px 32px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      position: relative;
      overflow: hidden;
    }

    /* 顶部微弱的高光边缘效果 */
    .auth-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .header-title {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.5px;
      color: var(--primary);
      margin: 0;
    }

    /* 输入框样式 */
    .input-group {
      margin-bottom: 24px;
    }

    .input-label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .input-field {
      width: 100%;
      background: var(--bg-color);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      border-radius: 8px;
      padding: 14px 16px;
      font-size: 15px;
      outline: none;
      transition: all 0.2s ease;
      /* 允许输入框内的文本被正常修改 */
      -webkit-user-select: text;
      user-select: text;
    }

    .input-field:focus {
      border-color: var(--border-hover);
      box-shadow: 0 0 0 1px var(--border-hover);
    }

    .input-field.mono {
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 1px;
    }

    .row {
      display: flex;
      gap: 16px;
    }
    .row .input-group {
      flex: 1;
    }

    /* 验证码展示区 */
    .token-wrapper {
      margin: 40px 0 30px 0;
      text-align: center;
    }

    #token {
      font-family: 'JetBrains Mono', monospace;
      font-size: 56px;
      font-weight: 700;
      letter-spacing: 14px;
      margin: 0;
      margin-right: -14px; /* 补偿最后一个字符的间距使其绝对居中 */
      color: var(--primary);
      pointer-events: none; /* 防止被误触选中 */
    }

    /* 进度条与倒计时 */
    .timer-info {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 10px;
      font-weight: 500;
    }

    .progress-bar-bg {
      width: 100%;
      height: 4px;
      background: var(--border-color);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: var(--primary);
      border-radius: 2px;
      transition: width 0.2s linear, background-color 0.3s ease;
    }

    /* 当时间少于 5 秒时变红警示 */
    .progress-bar-fill.danger {
      background: #ff453a;
    }
    .text-danger {
      color: #ff453a !important;
    }

    /* 复制按钮 */
    .copy-btn {
      width: 100%;
      background: var(--primary);
      color: var(--primary-invert);
      border: none;
      border-radius: 8px;
      padding: 16px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s ease, opacity 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      /* 移除点击高亮 */
      -webkit-tap-highlight-color: transparent;
    }

    .copy-btn:hover {
      opacity: 0.9;
    }

    .copy-btn:active {
      transform: scale(0.98);
    }

    .copy-icon {
      width: 20px;
      height: 20px;
    }

    /* Toast 提示弹窗 (优雅纯净) */
    .toast-container {
      position: fixed;
      top: 40px;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      background: #1a1a1a;
      border: 1px solid #333333;
      color: #ffffff;
      padding: 14px 28px;
      border-radius: 100px;
      font-size: 14px;
      font-weight: 500;
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: 1000;
      display: flex;
      align-items: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .toast-container.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .toast-icon-check {
      color: #ffffff;
      margin-right: 8px;
      font-size: 16px;
      font-weight: bold;
    }

  </style>
</head>
<body>

  <script src="js/vue-2.4.0.min.js"></script>
  <script src="js/otpauth-3.1.3.min.js"></script>
  <script src="js/clipboard-2.0.6.min.js"></script>

  <div id="app" class="container" v-cloak>
    
    <!-- 弹窗提示，仅在复制时出现 -->
    <div class="toast-container" :class="{ show: showToast }">
      <span class="toast-icon-check">✓</span> 验证码已复制
    </div>

    <div class="auth-card">
      <div class="header">
        <h1 class="header-title">Authenticator</h1>
      </div>

      <div class="input-group">
        <label class="input-label">Secret Key</label>
        <input class="input-field mono" type="text" v-model="secret_key" placeholder="Paste your 2FA secret">
      </div>

      <div class="row">
        <div class="input-group">
          <label class="input-label">Digits</label>
          <input class="input-field" type="number" v-model="digits">
        </div>
        <div class="input-group">
          <label class="input-label">Period (s)</label>
          <input class="input-field" type="number" v-model="period">
        </div>
      </div>

      <div class="token-wrapper">
        <p id="token">{{ token }}</p>
      </div>

      <div class="input-group" style="margin-bottom: 32px;">
        <div class="timer-info">
          <span>Refresh in</span>
          <span :class="{ 'text-danger': updatingIn <= 5 }">{{ updatingIn }}s</span>
        </div>
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" :class="{ danger: updatingIn <= 5 }" :style="{ width: (updatingIn / period * 100) + '%' }"></div>
        </div>
      </div>

      <button id="clipboard-button" class="copy-btn" :data-clipboard-text="token">
        <!-- 纯净的 SVG 复制图标 -->
        <svg class="copy-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
        </svg>
        复制验证码
      </button>

    </div>

  </div>

  <script src="js/app.js?v=3.0"></script>
</body>
</html>
