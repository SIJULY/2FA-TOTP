<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>2FA Authenticator</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <style>
    [v-cloak] { display: none; }

    /* 现代 SaaS 商业级设计风格 (Stripe / Tailwind 风格) */
    :root {
      --bg-color: #F8FAFC;
      --card-bg: #FFFFFF;
      --text-main: #0F172A;
      --text-muted: #64748B;
      --primary: #4F46E5; /* 高级靛蓝色 */
      --primary-hover: #4338CA;
      --input-bg: #F1F5F9;
      --border: #E2E8F0;
    }

    * {
      box-sizing: border-box;
      /* 禁用移动端长按选中和菜单 */
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      /* 非常柔和的背景渐变，增加一点质感 */
      background: linear-gradient(135deg, #F8FAFC 0%, #E2E8F0 100%);
    }

    .main-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      width: 100%;
      padding: 20px;
    }

    /* 核心白色卡片，大圆角，柔和阴影 */
    .auth-card {
      width: 100%;
      max-width: 440px;
      background: var(--card-bg);
      border-radius: 24px;
      padding: 40px 32px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01);
      border: 1px solid rgba(255, 255, 255, 0.5);
    }

    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    /* 顶部的锁图标 */
    .header-icon {
      width: 48px;
      height: 48px;
      background: rgba(79, 70, 229, 0.1);
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      color: var(--primary);
    }

    .header-title {
      font-size: 24px;
      font-weight: 700;
      color: var(--text-main);
      margin: 0;
      letter-spacing: -0.5px;
    }

    .input-group {
      margin-bottom: 20px;
    }

    .input-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    /* 清爽的输入框 */
    .input-field {
      width: 100%;
      background: var(--input-bg);
      border: 2px solid transparent;
      color: var(--text-main);
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 15px;
      outline: none;
      transition: all 0.2s ease;
      /* 恢复输入框的文本选中和修改能力 */
      -webkit-user-select: text;
      user-select: text;
    }

    .input-field:focus {
      background: var(--card-bg);
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
    }

    .input-field.mono {
      font-family: 'JetBrains Mono', monospace;
    }

    .row {
      display: flex;
      gap: 16px;
    }

    .row .input-group {
      flex: 1;
    }

    /* 验证码展示区 */
    .token-display {
      background: #F8FAFC;
      border: 1px dashed #CBD5E1;
      border-radius: 16px;
      padding: 32px 20px;
      text-align: center;
      margin: 32px 0;
    }

    #token {
      font-family: 'JetBrains Mono', monospace;
      font-size: 48px;
      font-weight: 700;
      letter-spacing: 12px;
      margin: 0;
      margin-right: -12px; /* 补偿间距使之居中 */
      color: var(--primary);
      /* 禁止选中验证码 */
      pointer-events: none;
    }

    /* 倒计时 */
    .timer-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-muted);
    }

    .progress-bar-bg {
      width: 100%;
      height: 8px;
      background: var(--input-bg);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: var(--primary);
      border-radius: 4px;
      transition: width 0.2s linear;
    }

    .progress-bar-fill.warning {
      background: #EF4444; /* 红色警告 */
    }
    .text-warning {
      color: #EF4444 !important;
    }

    /* 复制按钮 */
    .copy-btn {
      width: 100%;
      background: var(--primary);
      color: #FFFFFF;
      border: none;
      border-radius: 12px;
      padding: 16px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      -webkit-tap-highlight-color: transparent;
      margin-top: 32px;
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2);
    }

    .copy-btn:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(79, 70, 229, 0.3);
    }

    .copy-btn:active {
      transform: translateY(1px);
      box-shadow: 0 2px 8px rgba(79, 70, 229, 0.2);
    }

    /* 成功提示 Toast */
    .toast-container {
      position: fixed;
      top: 40px;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      background: #1E293B;
      color: #FFFFFF;
      padding: 12px 24px;
      border-radius: 100px;
      font-size: 14px;
      font-weight: 500;
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: 1000;
      display: flex;
      align-items: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    .toast-container.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .toast-icon-check {
      color: #10B981; /* 绿色对勾 */
      margin-right: 8px;
      font-size: 18px;
    }

    /* 底部作者信息 (恢复) */
    .footer {
      width: 100%;
      text-align: center;
      padding: 24px;
      font-size: 14px;
      color: var(--text-muted);
    }

    .footer a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }

    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <script src="js/vue-2.4.0.min.js"></script>
  <script src="js/otpauth-3.1.3.min.js"></script>
  <script src="js/clipboard-2.0.6.min.js"></script>

  <div id="app" class="main-wrapper" v-cloak>
    
    <!-- 复制成功的提示 -->
    <div class="toast-container" :class="{ show: showToast }">
      <span class="toast-icon-check">✓</span> 验证码已复制
    </div>

    <div class="auth-card">
      <div class="header">
        <div class="header-icon">
          <!-- 锁的 SVG 图标 -->
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
        </div>
        <h1 class="header-title">Authenticator</h1>
      </div>

      <div class="input-group">
        <label class="input-label">Secret Key // 秘钥</label>
        <input class="input-field mono" type="text" v-model="secret_key" placeholder="Paste your 2FA secret">
      </div>

      <div class="row">
        <div class="input-group">
          <label class="input-label">Digits // 位数</label>
          <input class="input-field" type="number" v-model="digits">
        </div>
        <div class="input-group">
          <label class="input-label">Period // 周期(s)</label>
          <input class="input-field" type="number" v-model="period">
        </div>
      </div>

      <div class="token-display">
        <p id="token">{{ token }}</p>
      </div>

      <div>
        <div class="timer-row">
          <span>刷新倒计时</span>
          <span :class="{ 'text-warning': updatingIn <= 5 }">{{ updatingIn }}s</span>
        </div>
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" :class="{ warning: updatingIn <= 5 }" :style="{ width: (updatingIn / period * 100) + '%' }"></div>
        </div>
      </div>

      <button id="clipboard-button" class="copy-btn" :data-clipboard-text="token">
        <!-- 复制 SVG 图标 -->
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
        </svg>
        复制验证码
      </button>

    </div>
  </div>

  <!-- 恢复最初始的作者及超链接信息 -->
  <footer class="footer">
    Built with ❤️ by <a href="https://sijuly.nyc.mn" target="_blank">小龙女她爸</a>
  </footer>

  <script src="js/app.js?v=4.0"></script>
</body>
</html>
